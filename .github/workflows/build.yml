name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller ee-invoice-generator.spec --clean

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ee-invoice-generator-${{ github.ref_name }}
          path: dist/ee-invoice-generator/ee-invoice-generator.exe
          retention-days: 5

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ee-invoice-generator/ee-invoice-generator.exe
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}